<!DOCTYPE html>
<html>

<head>
  <title>Flexbox Pricing Table</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family: 'Sono', sans-serif;
      background-color: #f2f2f2;
    }

    /* FLEX CONTAINER */
    .pricing-container{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      height:100vh;
    }

    /* EACH CARD */
    .pricing-plan{
      background:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
      width:300px;
      box-shadow:0px 5px 15px rgba(0,0,0,0.1);
    }

    .plan-title{
      font-size:24px;
      font-weight:bold;
    }

    .plan-price{
      font-size:36px;
      margin:15px 0;
      font-weight:bold;
    }

    .plan-features{
      list-style:none;
      padding:0;
      margin:20px 0;
    }

    .plan-features li{
      margin:10px 0;
    }

    .plan-button{
      background:#ff6600;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    .plan-button:hover{
      background:#e65c00;
    }

    /* RESPONSIVE DESIGN */

    @media (max-width:1250px){

      .pricing-container{
        flex-direction:column;
        height:100%;
        padding:40px;
      }

    }

  </style>

</head>

<body>

  <div class="pricing-container">

    <div class="pricing-plan">
      <div class="plan-title">Basic</div>
      <div class="plan-price">$9.99/month</div>

      <ul class="plan-features">
        <li>✅ 10GB Storage</li>
        <li>✅ 1 User</li>
        <li>🚫 Support</li>
      </ul>

      <button class="plan-button">Sign Up</button>
    </div>


    <div class="pricing-plan">
      <div class="plan-title">Standard</div>
      <div class="plan-price">$19.99/month</div>

      <ul class="plan-features">
        <li>✅ 50GB Storage</li>
        <li>✅ 5 Users</li>
        <li>✅ Phone & Email Support</li>
      </ul>

      <button class="plan-button">Sign Up</button>
    </div>


    <div class="pricing-plan">
      <div class="plan-title">Premium</div>
      <div class="plan-price">$49.99/month</div>

      <ul class="plan-features">
        <li>✅ 100GB Storage</li>
        <li>✅ 10 Users</li>
        <li>✅ 24/7 Support</li>
      </ul>

      <button class="plan-button">Sign Up</button>
    </div>

  </div>

</body>

</html>
