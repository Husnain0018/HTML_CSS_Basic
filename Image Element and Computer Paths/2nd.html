<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Night - 2024 | PUGC</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      font-size: 2.6rem;
      margin: 0.2em 0;
      color: #1a237e; /* dark blue for university feel */
    }
    h2, h3 {
      margin: 1.2em 0 0.6em;
      color: #333;
    }
    .date {
      font-size: 1.4rem;
      font-weight: 500;
      color: #d32f2f; /* accent red */
      margin: 0.4em 0 1.5em;
    }
    .logo {
      width: 140px;
      height: auto;
      margin: 25px auto 35px;
      display: block;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 1em auto;
      max-width: 420px;
      text-align: left;
    }
    ul li {
      margin: 0.9em 0;
      font-size: 1.15rem;
      position: relative;
      padding-left: 1.8em;
    }
    ul li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #d32f2f;
      font-size: 1.6rem;
      line-height: 1;
    }
    .location-link {
      display: inline-block;
      margin-top: 1.5em;
      padding: 12px 28px;
      background: #1976d2;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1.15rem;
      font-weight: 500;
      transition: background 0.3s;
    }
    .location-link:hover {
      background: #1565c0;
    }
    .footer-note {
      margin-top: 3em;
      font-size: 0.95rem;
      color: #555;
    }

    @media (max-width: 600px) {
      .container { padding: 20px; margin: 20px; }
      h1 { font-size: 2.1rem; }
      .date { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>IT Night - 2024</h1>
    
    <p class="date">On June 30, 2024</p>
    
    <p>On June 30, 2024</p>
    
    <p>Printed Flex 2024</p>

    <!-- Replace src with actual logo URL if you have it; this is a placeholder -->
    <img src="https://pu.edu.pk/images/pu_logo.png" 
         alt="Punjab University Logo" 
         class="logo"
         onerror="this.src='https://via.placeholder.com/140x140?text=PUGC+Logo';">

    <h2>What to bring</h2>
    <ul>
      <li>Student ID Card</li>
      <li>Ticket</li>
      <li>Printed Flex that showcase your favorite memories at PUGC</li>
    </ul>

    <h2>Location</h2>
    <p>PU Gujranwala Campus (PUGC)</p>
    
    <a href="https://www.google.com/maps/search/?api=1&query=University+of+the+Punjab+Gujranwala+Campus" 
       target="_blank" 
       class="location-link">
      Google Maps - PUGC
    </a>

    <p class="footer-note">Near Ali Pur Chowk, Rawalpindi Bypass, Gujranwala</p>
  </div>

</body>
</html>
