<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Image</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.3em;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .image-wrapper {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 100%;
      margin: 0 auto;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }
      .subtitle {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>My favorite image on Internet</h1>
    <p class="subtitle">My favorite image on Internet</p>

    <div class="image-wrapper">
      <img src="Free fire game .jpg" 
           alt="Snowy owl with spread wings landing on a branch">
    </div>
  </div>

</body>
</html>
