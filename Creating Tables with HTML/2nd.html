<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminar Schedule Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            font-weight: bold;
            background-color: #f2f2f2;
        }
        .schedule-header {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <!-- Main headers -->
        <tr>
            <th>Day</th>
            <th colspan="2">Schedule</th>
            <th>Seminar</th>
        </tr>
        
        <!-- Sub headers -->
        <tr>
            <th></th>
            <th>Begin</th>
            <th>End</th>
            <th>Topic</th>
        </tr>
        
        <!-- Monday row -->
        <tr>
            <td>Monday</td>
            <td>8:00 a.m.</td>
            <td>5:00 p.m.</td>
            <td>Introduction to XML<br>Validity: DTD and Relax NG</td>
        </tr>
        
        <!-- Tuesday rows -->
        <tr>
            <td>Tuesday</td>
            <td>8:00 a.m.</td>
            <td>11:00 a.m.</td>
            <td>XPath</td>
        </tr>
        <tr>
            <td></td>
            <td>11:00 a.m.</td>
            <td>2:00 p.m.</td>
            <td>XSL Transformations</td>
        </tr>
        
        <!-- Wednesday row -->
        <tr>
            <td>Wednesday</td>
            <td>8:00 a.m.</td>
            <td>12:00 p.m.</td>
            <td>XSL Formatting Objects</td>
        </tr>
    </table>
</body>
</html>
