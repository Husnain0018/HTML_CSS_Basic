<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Structure</title>

<style>
body{
  text-align: center;
  font-family: Arial, sans-serif;
}

h1{
  font-size: 40px;
}

h2{
  font-size: 32px;
}

h3{
  font-size: 24px;
  font-weight: normal;
}

p{
  font-size: 22px;
}
</style>

</head>

<body>

<h1>H1: The title of the post</h1>

<p>Introduction</p>

<h2>H2: First point</h2>

<h3>H3: Subsection</h3>
<h3>H3: Subsection</h3>
<h3>H3: Subsection</h3>

<h2>H2: Second point</h2>

<h3>H3: Subsection</h3>
<h3>H3: Subsection</h3>

<p><strong>Conclusion</strong></p>

</body>
</html>
