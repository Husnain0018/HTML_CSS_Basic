<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nested Lists Example</title>
</head>

<body>

<h1>My Favorite Foods</h1>

<ol>
  <li>Fruit
      <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
      </ul>
  </li>

  <li>Vegetables
      <ul>
        <li>Carrot</li>
        <li>Potato</li>
        <li>Spinach</li>
      </ul>
  </li>

  <li>Desserts
      <ul>
        <li>Cake</li>
        <li>Ice Cream</li>
        <li>Chocolate</li>
      </ul>
  </li>

</ol>

</body>
</html>
