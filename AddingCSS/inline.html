<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline CSS Example</title>
</head>
<body>
  <h1 style="color: blue; text-align: center;">Inline CSS Example</h1>
  
  <p style="font-size: 18px; color: green; font-family: Arial;">
    This paragraph uses inline CSS. The style is applied directly using the style attribute.
  </p>
  
  <p style="border: 2px solid red; padding: 10px; background-color: #f0f0f0;">
    This paragraph has a border and background color applied through inline CSS.
  </p>
  
  <div style="margin-top: 20px;">
    <a href="index.html" style="color: purple; text-decoration: none;">Back to Home</a>
  </div>
</body>
</html>
