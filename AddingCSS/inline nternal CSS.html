<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internal CSS Example</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      margin: 20px;
    }
    
    h1 {
      color: #2c3e50;
      text-align: center;
      border-bottom: 3px solid #3498db;
      padding-bottom: 10px;
    }
    
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #34495e;
    }
    
    .highlight {
      background-color: #ffff99;
      padding: 10px;
      border-left: 5px solid #f39c12;
    }
    
    a {
      color: #e74c3c;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Internal CSS Example</h1>
  
  <p>This paragraph uses internal CSS. The styles are defined in the &lt;style&gt; tag in the head section.</p>
  
  <p class="highlight">This paragraph has a special class applied, demonstrating how internal CSS can target specific elements.</p>
  
  <div>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
